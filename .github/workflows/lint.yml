name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
                   --inline-suppr \
                   --error-exitcode=1 \
                   -I include/ -I src/ \
                   src/ include/

  clang-format:
    name: Clang-Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Clang-Format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Verify Code Formatting
        run: |
          find src/ include/ -type f \( -name "*.c" -o -name "*.h" \) \
            ! -name "imgui_impl_sdlrenderer3_c.cpp" \
            | xargs --no-run-if-empty clang-format --dry-run --Werror

  clang-tidy-diff:
    name: Clang-Tidy (diff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        uses: gerlero/apt-install@v1
        with:
          packages: |
            cmake ninja-build pkg-config
            libasound2-dev libpulse-dev libx11-dev libxext-dev libxrandr-dev
            libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libusb-1.0-0-dev
            libvulkan-dev glslc spirv-headers libcurl4-openssl-dev
            clang-tidy

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run Clang-Tidy on Diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD~1"
          fi

          DIFF=$(git diff -U0 "$BASE_SHA" -- 'src/*.[ch]' 'include/*.[ch]')
          if [ -z "$DIFF" ]; then
            echo "No C/H file changes detected, skipping clang-tidy."
            exit 0
          fi

          echo "$DIFF" | clang-tidy-diff -p1 -path build -use-color
