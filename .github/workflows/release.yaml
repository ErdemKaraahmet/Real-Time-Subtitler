name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v', e.g., v1.0.0
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: real-time-subtitler-${{ github.ref_name }}-windows.zip
          - os: ubuntu-latest
            artifact_name: real-time-subtitler-${{ github.ref_name }}-ubuntu.zip
          - os: macos-latest
            artifact_name: real-time-subtitler-${{ github.ref_name }}-macos.zip
    
    runs-on: ${{ matrix.os }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: "1"
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'include/**', 'deps/**') }}
          restore-keys: |
            ccache-${{ matrix.os }}-
      
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-vulkan-devel
            mingw-w64-ucrt-x86_64-spirv-headers
            mingw-w64-ucrt-x86_64-shaderc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-ccache
      

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        uses: gerlero/apt-install@v1
        with:
          packages: |
            cmake ninja-build pkg-config ccache
            libasound2-dev libpulse-dev libx11-dev libxext-dev libxrandr-dev
            libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libusb-1.0-0-dev
            libvulkan-dev glslc spirv-headers libcurl4-openssl-dev
      
      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install --quiet ccache
      
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -B build -S . -G Ninja -DGGML_NATIVE=OFF -DCMAKE_BUILD_TYPE=Release -DRTS_VERSION="${{ github.ref_name }}"
        
      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -S . -G Ninja -DGGML_NATIVE=OFF -DCMAKE_BUILD_TYPE=Release -DRTS_VERSION="${{ github.ref_name }}"

      - name: Verify GPU acceleration status
        run: |
          # whisper.cpp already sets GGML_METAL=ON on macOS, checked incase they change it
          python -c "
          import sys
          content = open('build/CMakeCache.txt').read()
          target = 'GGML_METAL:BOOL=ON' if sys.platform == 'darwin' else 'GGML_VULKAN:BOOL=ON'
          assert target in content, f'{target} not enabled!'
          "
        
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --config Release
        
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release
        
      - name: Copy MSYS2 DLLs (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          echo "Resolving and copying MSYS2 runtime dependencies..."
          list=$(ldd bin/Real-Time-Subtitler.exe bin/*.dll 2>/dev/null | grep $MINGW_PREFIX | sed 's/.* => //' | sed 's/ \(.*\)//' | sort -u)
          for dll in $list; do
            if [ -f "$dll" ]; then
              echo "Copying $dll -> bin/"
              cp -u "$dll" bin/
            fi
          done
      - name: Verify no unresolved shared library dependencies (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          for f in bin/Real-Time-Subtitler.exe bin/*.dll; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            # Filter out false-positive Windows API Sets
            missing=$(ldd "$f" | grep -i "not found" | grep -ivE "api-ms-win-|ext-ms-" || true)
            if [ -n "$missing" ]; then
              echo "Missing dependency in $f:"
              echo "$missing"
              exit 1
            fi
            # Ensure no DLL resolves to the MSYS2 system path instead of local bin/
            leaks=$(ldd "$f" | grep -E "=> /ucrt|=> /mingw" || true)
            if [ -n "$leaks" ]; then
              echo "Dependency leak in $f (points to MSYS2 system instead of local bin/):"
              echo "$leaks"
              exit 1
            fi
          done

      - name: Verify no unresolved shared library dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          for f in bin/Real-Time-Subtitler bin/*.so*; do
            [ -f "$f" ] || continue
            missing=$(ldd "$f" | grep "not found" || true)
            if [ -n "$missing" ]; then
              echo "Unresolved dependencies in $f:"
              echo "$missing"
              exit 1
            fi
          done

      - name: Verify no unresolved shared library dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          for f in bin/Real-Time-Subtitler bin/*.dylib; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            # Skip the first line (the binary/lib's own install name), extract dep paths
            libs=$(otool -L "$f" | tail -n +2 | awk '{print $1}')
            for lib in $libs; do
              case "$lib" in
                @rpath/*|@loader_path/*)
                  libname=$(basename "$lib")
                  resolved="bin/$libname"
                  if [ ! -f "$resolved" ]; then
                    echo "Unresolved dependency in $f: $lib (expected at $resolved, not found)"
                    exit 1
                  fi
                  echo "  OK: $lib -> $resolved"
                  ;;
                *)
                  # Absolute system path (e.g. /usr/lib/libSystem.B.dylib) — provided by the OS, skip
                  ;;
              esac
            done
          done

      - name: Prepare Artifacts
        run: |
          cmake -E rename bin Real-Time-Subtitler
          cmake -E tar "cfv" "${{ matrix.artifact_name }}" --format=zip Real-Time-Subtitler/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        
      - name: Generate Changelog
        id: generate_changelog
        run: |
          git fetch --tags --force
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "## What's Changed" >> $GITHUB_ENV
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG"..HEAD --pretty=format:"• %s in %h" >> $GITHUB_ENV
            echo -e "\n\nFull Changelog: [$PREV_TAG...${{ github.ref_name }}](https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }})" >> $GITHUB_ENV
          else
            git log --pretty=format:"• %s in %h" >> $GITHUB_ENV
            echo -e "\n\nFirst Release!" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.CHANGELOG }}
          files: |
            */*.zip
