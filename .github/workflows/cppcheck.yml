# Note: clang-tidy is managed locally via CMake (-DRTS_CLANG_TIDY=ON) to keep CI fast
# Note: clang-format is enforced locally prior to commits via .githooks/pre-commit

name: Cppcheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cppcheck:
    name: Cppcheck Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
                   --inline-suppr \
                   --error-exitcode=1 \
                   -I include/ \
                   -I src/ \
                   src/ include/
